services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: voiceiq-backend
    restart: unless-stopped
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
      - OLLAMA_MODEL=llama3.2:latest
    volumes:
      - voiceiq-uploads:/app/uploads
      - voiceiq-exports:/app/exports
    ports:
      - "8002:8002"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: voiceiq-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend

volumes:
  voiceiq-uploads:
  voiceiq-exports:
