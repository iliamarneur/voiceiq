services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: clearrecap-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
      - OLLAMA_MODEL=llama3.2:latest
    volumes:
      - clearrecap-data:/app/data
      - clearrecap-uploads:/app/uploads
      - clearrecap-exports:/app/exports
      - ./content:/app/content:ro
    ports:
      - "8002:8002"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: clearrecap-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  clearrecap-data:
  clearrecap-uploads:
  clearrecap-exports:
